# Prefix and indexing
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# General ergonomics
set -g mouse on
set -g history-limit 100000
set -sg escape-time 10
set -g focus-events on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",ghostty:RGB"
set -s set-clipboard on

# Keep new panes and windows rooted in the current path.
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Vim-style pane movement and resizing.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Use vi keys in copy mode and copy selections to the macOS clipboard.
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Session and window chooser sorted by name.
bind s choose-tree -Z -O name

# Catppuccin Mocha-inspired palette.
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 120
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"
set -g pane-border-style "fg=#585b70"
set -g pane-active-border-style "fg=#89b4fa"
set -g mode-style "bg=#45475a,fg=#cdd6f4"

setw -g window-status-format " #[fg=#6c7086,bg=#1e1e2e]#I #[fg=#bac2de,bg=#1e1e2e]#W "
setw -g window-status-current-format " #[fg=#1e1e2e,bg=#89b4fa,bold]#I #[fg=#1e1e2e,bg=#89b4fa,bold]#W "
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=#f9e2af,bg=#1e1e2e"
setw -g window-status-bell-style "fg=#1e1e2e,bg=#f38ba8,bold"

set -g status-left " #[fg=#1e1e2e,bg=#cba6f7,bold] #S "
set -g status-right "#[fg=#a6adc8,bg=#1e1e2e]#{?client_prefix,#[fg=#1e1e2e]#[bg=#f38ba8] PREFIX ,} #[fg=#1e1e2e,bg=#a6e3a1] #{pane_current_command} #[fg=#1e1e2e,bg=#89dceb] %Y-%m-%d #[fg=#1e1e2e,bg=#74c7ec] %H:%M "
